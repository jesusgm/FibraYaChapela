<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Fiber optic cable representation -->
  <rect x="4" y="14" width="24" height="4" rx="2" fill="#60a5fa"/>
  
  <!-- Light pulses representing data -->
  <circle cx="8" cy="16" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="16" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="16" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="20" cy="16" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="24" cy="16" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <!-- WiFi signal waves -->
  <path d="M10 10 Q16 6 22 10" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M12 12 Q16 9 20 12" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M14 14 Q16 12 18 14" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
